<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Private Chat</title>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            color: #222;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: #1f2937;
            color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .header p {
            margin: 6px 0 0;
            color: #cbd5e1;
        }

        .auth-box {
            padding: 16px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        .auth-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .status {
            padding: 10px 16px;
            font-size: 14px;
            background: #f9fafb;
            color: #4b5563;
            border-bottom: 1px solid #e5e7eb;
        }

        .messages {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            max-width: 75%;
        }

        .mine {
            margin-left: auto;
            background: #dbeafe;
            border-color: #bfdbfe;
        }

        .meta {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .content {
            font-size: 16px;
            margin-bottom: 8px;
            white-space: pre-wrap;
        }

        .reply {
            font-size: 13px;
            background: rgba(0, 0, 0, 0.05);
            border-left: 4px solid #64748b;
            padding: 6px;
            border-radius: 6px;
            margin-bottom: 8px;
            color: #475569;
        }

        .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .actions button {
            background: #e5e7eb;
            color: #111827;
            padding: 5px 8px;
            font-size: 13px;
        }

        .composer {
            display: flex;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .composer input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
        }

        .replying {
            display: none;
            padding: 10px 16px;
            background: #fff7ed;
            color: #9a3412;
            border-top: 1px solid #fed7aa;
        }

        .replying button {
            background: #ea580c;
            margin-left: 10px;
        }

        .error {
            color: #dc2626;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Private Chat</h1>
            <p>You are chatting with user id: <strong id="receiverIdText"></strong></p>
        </div>

        <div class="auth-box">
            <input id="tokenInput" placeholder="Paste your JWT token here" />
            <button onclick="connectChat()">Connect</button>
        </div>

        <div id="status" class="status">Not connected</div>

        <div id="messages" class="messages"></div>

        <div id="replying" class="replying">
            Replying to message <span id="replyId"></span>
            <button onclick="cancelReply()">Cancel</button>
        </div>

        <div class="composer">
            <input id="messageInput" placeholder="Write a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const receiverId = Number(pathParts[pathParts.length - 1]);

        let socket = null;
        let messages = [];
        let currentUser = null;
        let replyToId = null;

        const tokenInput = document.getElementById('tokenInput');
        const statusBox = document.getElementById('status');
        const messagesBox = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const replyingBox = document.getElementById('replying');
        const replyIdBox = document.getElementById('replyId');
        const receiverIdText = document.getElementById('receiverIdText');

        receiverIdText.textContent = receiverId;

        const savedToken = localStorage.getItem('chat_token');
        if (savedToken) {
            tokenInput.value = savedToken;
        }

        if (!receiverId || Number.isNaN(receiverId)) {
            setStatus('Invalid receiver id in URL', true);
        }

        function connectChat() {
            const token = tokenInput.value.trim();

            if (!token) {
                setStatus('Please paste your token first', true);
                return;
            }

            localStorage.setItem('chat_token', token);

            socket = io({
                auth: {
                    token: token
                }
            });

            socket.on('connect', function () {
                setStatus('Connected. Loading conversation...', false);
                socket.emit('joinConversation', { receiverId: receiverId });
            });

            socket.on('connected', function (data) {
                currentUser = data.user;
                setStatus(
                    'Connected as ' +
                    currentUser.username +
                    ' - chatting with user ' +
                    receiverId,
                    false
                );
            });

            socket.on('conversationHistory', function (history) {
                messages = history;
                renderMessages();
            });

            socket.on('newMessage', function (data) {
                const exists = messages.some(function (message) {
                    return message.id === data.message.id;
                });

                if (!exists) {
                    messages.push(data.message);
                }

                renderMessages();
            });

            socket.on('messageReactionUpdated', function (data) {
                const message = messages.find(function (message) {
                    return message.id === data.messageId;
                });

                if (message) {
                    message.reactions = data.reactions;
                    renderMessages();
                }
            });

            socket.on('userTyping', function (data) {
                setStatus(data.username + ' is typing...', false);

                setTimeout(function () {
                    if (currentUser) {
                        setStatus(
                            'Connected as ' +
                            currentUser.username +
                            ' - chatting with user ' +
                            receiverId,
                            false
                        );
                    }
                }, 1000);
            });

            socket.on('chatError', function (data) {
                setStatus(data.message, true);
            });

            socket.on('disconnect', function () {
                setStatus('Disconnected', true);
            });
        }

        function sendMessage() {
            if (!socket || !socket.connected) {
                setStatus('Connect first', true);
                return;
            }

            const content = messageInput.value.trim();

            if (!content) {
                return;
            }

            socket.emit('sendMessage', {
                receiverId: receiverId,
                content: content,
                replyToId: replyToId
            });

            messageInput.value = '';
            cancelReply();
        }

        function reactToMessage(messageId, emoji) {
            if (!socket || !socket.connected) {
                setStatus('Connect first', true);
                return;
            }

            socket.emit('reactToMessage', {
                messageId: messageId,
                emoji: emoji
            });
        }

        function startReply(messageId) {
            replyToId = messageId;
            replyIdBox.textContent = messageId;
            replyingBox.style.display = 'block';
            messageInput.focus();
        }

        function cancelReply() {
            replyToId = null;
            replyIdBox.textContent = '';
            replyingBox.style.display = 'none';
        }

        messageInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                sendMessage();
            } else if (socket && socket.connected) {
                socket.emit('typing', {
                    receiverId: receiverId
                });
            }
        });

        function renderMessages() {
            messagesBox.innerHTML = '';

            messages.forEach(function (message) {
                const div = document.createElement('div');
                const isMine = currentUser && message.senderId === currentUser.id;

                div.className = isMine ? 'message mine' : 'message';

                let reactionsHtml = '';
                if (message.reactions && message.reactions.length > 0) {
                    reactionsHtml = message.reactions
                        .map(function (reaction) {
                            return (
                                '<span>' +
                                escapeHtml(reaction.emoji) +
                                ' ' +
                                reaction.count +
                                '</span>'
                            );
                        })
                        .join(' ');
                }

                let replyHtml = '';
                if (message.replyTo) {
                    replyHtml =
                        '<div class="reply">Reply to <strong>' +
                        escapeHtml(
                            message.replyTo.senderUsername ||
                            'User ' + message.replyTo.senderId
                        ) +
                        '</strong>: ' +
                        escapeHtml(message.replyTo.content) +
                        '</div>';
                }

                div.innerHTML =
                    '<div class="meta">' +
                    '<strong>' +
                    escapeHtml(message.senderUsername || 'User ' + message.senderId) +
                    '</strong>' +
                    ' - ' +
                    new Date(message.createdAt).toLocaleString() +
                    '</div>' +
                    replyHtml +
                    '<div class="content">' +
                    escapeHtml(message.content) +
                    '</div>' +
                    '<div class="actions">' +
                    '<button onclick="reactToMessage(' +
                    message.id +
                    ', \'👍\')">👍</button>' +
                    '<button onclick="reactToMessage(' +
                    message.id +
                    ', \'❤️\')">❤️</button>' +
                    '<button onclick="reactToMessage(' +
                    message.id +
                    ', \'😂\')">😂</button>' +
                    '<button onclick="reactToMessage(' +
                    message.id +
                    ', \'🔥\')">🔥</button>' +
                    '<button onclick="startReply(' +
                    message.id +
                    ')">Reply</button>' +
                    '<span>' +
                    reactionsHtml +
                    '</span>' +
                    '</div>';

                messagesBox.appendChild(div);
            });

            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        function setStatus(message, isError) {
            statusBox.textContent = message;
            statusBox.className = isError ? 'status error' : 'status';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }
    </script>
</body>

</html>
